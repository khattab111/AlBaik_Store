name: albaik-store

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: albaik_store
      MYSQL_USER: albaik
      MYSQL_PASSWORD: albaik_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3307:3306"
    volumes:
      - albaik_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -ualbaik -palbaik_password --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

  node:
    image: node:20-bookworm
    working_dir: /var/www/html
    user: "1000:1000"
    volumes:
      - .:/var/www/html
    ports:
      - "5173:5173"
    profiles:
      - frontend
    command: npm run dev -- --host 0.0.0.0

volumes:
  albaik_mysql_data:
